<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Vault List</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@400;500;600&family=Quicksand:wght@400;500;600;700&display=swap');

:root{
  --void:#070707;
  --card:#131010;
  --crimson:#7A1128;
  --crimson-bright:#B3122A;
  --silver-dim:#8a8a92;
  --sage:#6f8f6f;
  --ivory:#EDE7E2;
  --ivory-dim:#a89e9a;
  --line:#2a2222;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--void); color:var(--ivory);
  font-family:'Cormorant Garamond', serif; font-size:17px;
  padding:32px 16px 80px; min-height:100vh;
}
.wrap{ max-width:560px; margin:0 auto; }
h1{
  font-family:'Playfair Display', serif; font-size:28px; text-align:center; margin:0 0 4px; color:var(--ivory);
}
.count{
  text-align:center; font-family:'Quicksand'; font-size:12px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--crimson-bright); margin-bottom:18px;
}
.search-box{
  display:block; width:100%; border:1px solid var(--line); background:var(--card); color:var(--ivory);
  border-radius:2px; padding:10px 14px; font-family:'Cormorant Garamond'; font-size:15px; outline:none;
  margin-bottom:18px;
}
.search-box::placeholder{ color:var(--ivory-dim); }
.search-box:focus{ border-color:var(--crimson-bright); }

.tabs{
  display:flex; gap:6px; overflow-x:auto; padding-bottom:14px; margin-bottom:6px;
}
.tab{
  border:1px solid var(--line); background:var(--card); color:var(--ivory-dim);
  padding:7px 13px; border-radius:16px; font-family:'Quicksand'; font-weight:600; font-size:12px;
  cursor:pointer; white-space:nowrap;
}
.tab.active{ background:var(--crimson); color:#fff; border-color:var(--crimson-bright); }

.row{
  display:flex; align-items:center; gap:10px; padding:12px 4px; flex-wrap:wrap;
  border-bottom:1px solid var(--line);
}
.row.done{ opacity:.5; }
.row.done .row-name{ text-decoration:line-through; }
.row-name{ flex:1; font-size:17px; color:var(--ivory); }
.row-qty{ display:flex; align-items:center; gap:8px; }
.row-qty button{
  width:26px; height:26px; border-radius:50%; border:1px solid var(--silver-dim); background:transparent;
  color:var(--ivory-dim); font-size:15px; cursor:pointer; line-height:1;
}
.row-qty button:hover{ border-color:var(--crimson-bright); color:var(--crimson-bright); }
.row-qty .n{
  font-family:'Playfair Display'; font-size:17px; min-width:22px; text-align:center; color:var(--ivory);
}
.row-del{
  border:none; background:none; color:var(--silver-dim); font-family:'Quicksand'; font-size:12px;
  cursor:pointer; padding:4px;
}
.row-del:hover{ color:var(--crimson-bright); }

.tag{
  font-family:'Quicksand'; font-size:9.5px; text-transform:uppercase; letter-spacing:.06em; font-weight:700;
  padding:3px 8px; border-radius:2px; border:1px solid var(--silver-dim); color:var(--ivory-dim); white-space:nowrap;
}
.tag.pending{ border-color:#6b551b; color:#d4a117; }
.tag.done{ border-color:var(--sage); color:var(--sage); }
.status-btn{
  border:1px solid var(--silver-dim); background:transparent; color:var(--silver-dim); font-family:'Quicksand';
  font-size:10.5px; padding:6px 10px; border-radius:2px; cursor:pointer; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap;
}
.status-btn:hover{ border-color:var(--crimson-bright); color:var(--crimson-bright); }

.empty{ text-align:center; color:var(--ivory-dim); font-style:italic; padding:30px 0; }

.add-box{
  display:flex; gap:8px; margin-top:22px; flex-wrap:wrap; align-items:center;
}
.add-box input, .add-box select{
  border:1px solid var(--line); background:var(--card); color:var(--ivory); border-radius:2px;
  padding:10px 12px; font-family:'Cormorant Garamond'; font-size:15px; outline:none;
}
.add-box input::placeholder{ color:var(--ivory-dim); }
.add-box input[name="name"]{ flex:1; min-width:140px; }
.add-box input[name="qty"]{ width:56px; }
.add-box select{ max-width:220px; }
.add-box input:focus, .add-box select:focus{ border-color:var(--crimson-bright); }
.add-box button{
  background:var(--crimson); color:#fff; border:1px solid var(--crimson-bright); border-radius:2px;
  padding:10px 18px; font-family:'Quicksand'; font-weight:700; font-size:12.5px; text-transform:uppercase;
  letter-spacing:.03em; cursor:pointer;
}
.add-box button:hover{ background:var(--crimson-bright); }

.status{ text-align:center; font-family:'Quicksand'; font-size:12px; color:var(--silver-dim); height:16px; margin-top:10px; }
.note{ text-align:center; font-family:'Quicksand'; font-size:11px; color:var(--ivory-dim); margin-top:6px; font-style:italic; }
</style>
</head>
<body>
<div class="wrap">
  <h1>My Vault List</h1>
  <div class="count" id="countLine">loading…</div>

  <input type="text" id="searchInput" placeholder="Find something…" class="search-box">

  <div class="tabs" id="tabs"></div>

  <div id="list"></div>
  <div class="empty" id="emptyMsg" style="display:none;"></div>

  <div class="add-box" id="addBoxItem">
    <input type="text" name="name" id="newName" placeholder="Add an item…">
    <select id="newSection"></select>
    <input type="number" name="qty" id="newQty" placeholder="Qty" value="1" min="1">
    <button id="addBtn">Add</button>
  </div>

  <div class="add-box" id="addBoxWish" style="display:none;">
    <input type="text" id="wishName" placeholder="Something you're tempted by…" style="flex:1;">
    <button id="addWishBtn">Add</button>
  </div>

  <div class="add-box" id="addBoxFix" style="display:none; flex-direction:column; align-items:stretch;">
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <select id="fixLinkSelect" style="flex:1; min-width:160px;"></select>
      <select id="fixType">
        <option value="Stitching">Stitching</option>
        <option value="Ironing">Ironing</option>
        <option value="Dry Clean">Dry Clean</option>
      </select>
    </div>
    <input type="text" id="fixCustomName" placeholder="Name this piece…" style="display:none; margin-top:8px;">
    <button id="addFixBtn" style="margin-top:8px; align-self:flex-start;">Add to Fixing</button>
  </div>

  <div class="status" id="statusMsg"></div>
  <div class="note" id="persistNote">Saves automatically on this device.</div>
</div>

/* Which DEFAULT_ITEMS rows (by index within the full array) start out linked to a Fixing task.
   We resolve these to real item ids once items are created, then seed the Fixing list from them. */
const DEFAULT_FIXING_LINKS = [
  { matchName:"Kurta Set (maroon)", matchQty:1, type:"Ironing" },
  { matchName:"Kurta Set (dark blue)", matchQty:1, type:"Ironing" },
  { matchName:"Kurta (red)", matchQty:1, type:"Ironing" },
  { matchName:"Kurta Set (black)", matchQty:1, type:"Dry Clean" },
  { matchName:"Kurta (white)", matchQty:2, type:"Stitching" },
  { matchName:"Kurta (black)", matchQty:1, type:"Stitching" },
  { matchName:"Kurta (blue)", matchQty:2, type:"Stitching" },
  { matchName:"Kurta (yellow)", matchQty:1, type:"Stitching" },
  { matchName:"Kurta (pink)", matchQty:1, type:"Stitching" },
];

/* ---------- storage: works in Claude's preview, and falls back to
   the browser's own storage once hosted somewhere like GitHub Pages ---------- */
const hasClaudeStorage = typeof window.storage !== 'undefined';
async function storageGet(key){
  if(hasClaudeStorage) return await window.storage.get(key, false);
  const raw = localStorage.getItem(key);
  return raw !== null ? { value: raw } : null;
}
async function storageSet(key, value){
  if(hasClaudeStorage) return await window.storage.set(key, value, false);
  localStorage.setItem(key, value);
  return { ok:true };
}

let items = [];
let wishlist = [];
let fixing = [];
let activeTab = "All";
let persistenceWorks = true;

async function loadData(){
  try{
    const res = await storageGet('vault-sectioned-items');
    if(res && res.value){ items = JSON.parse(res.value); }
    else throw new Error('none');
  }catch(e){
    items = DEFAULT_ITEMS.map((row,i)=>({ id:'i'+i, section:row[0], name:row[1], qty:row[2] }));
    await saveKey('vault-sectioned-items', items);
  }
  try{
    const w = await storageGet('vault-wishlist');
    if(w && w.value) wishlist = JSON.parse(w.value);
  }catch(e){ wishlist = []; }
  try{
    const f = await storageGet('vault-fixing');
    if(f && f.value){ fixing = JSON.parse(f.value); }
  }catch(e){ fixing = []; }

  // Catch-up check: make sure the kurtas that are out for stitching/ironing/dry-clean
  // exist in the list AND are linked in Fixing — runs no matter when your data was first saved.
  let migratedFlag = null;
  try{ migratedFlag = await storageGet('vault-fixing-migrated-v1'); }
  catch(e){ migratedFlag = null; } // missing key throws here — that's expected, treat as "not migrated yet"

  if(!migratedFlag || !migratedFlag.value){
    let changedItems = false, changedFixing = false;
    DEFAULT_FIXING_LINKS.forEach((link, n)=>{
      let match = items.find(it => it.section==="Kurtas" && it.name===link.matchName && it.qty===link.matchQty);
      if(!match){
        match = { id:'i'+Date.now()+'-'+n, section:"Kurtas", name:link.matchName, qty:link.matchQty };
        items.push(match);
        changedItems = true;
      }
      const alreadyLinked = fixing.find(fx => fx.linkedItemId === match.id);
      if(!alreadyLinked){
        fixing.push({ id:'f'+Date.now()+'-'+n, linkedItemId: match.id, name: link.matchName, type: link.type, status:"Pending" });
        changedFixing = true;
      }
    });
    if(changedItems) await saveItems();
    if(changedFixing) await saveFixing();
    try{ await storageSet('vault-fixing-migrated-v1', 'true'); }catch(e){ /* non-fatal */ }
  }

  render();
}
async function saveKey(key, data){
  try{
    const r = await storageSet(key, JSON.stringify(data));
    if(!r) throw new Error('empty');
    if(!persistenceWorks){ persistenceWorks = true; updateNote(); }
  }catch(e){
    persistenceWorks = false; updateNote();
  }
}
function saveItems(){ return saveKey('vault-sectioned-items', items); }
function saveWishlist(){ return saveKey('vault-wishlist', wishlist); }
function saveFixing(){ return saveKey('vault-fixing', fixing); }
function updateNote(){
  document.getElementById('persistNote').textContent = persistenceWorks
    ? "Saves automatically on this device."
    : "Saving isn't working right now — this list will hold for this session only.";
}
function flash(msg){
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  setTimeout(()=>{ if(el.textContent===msg) el.textContent=''; }, 1300);
}

/* returns the active (Pending) fixing task linked to a given item id, or null */
function activeFixFor(itemId){
  return fixing.find(f => f.linkedItemId===itemId && f.status==='Pending') || null;
}

function buildTabs(){
  const all = ["All", ...SECTIONS, "Fixing", "Wishlist"];
  document.getElementById('tabs').innerHTML = all.map(s=>
    `<button class="tab ${s===activeTab?'active':''}" data-sec="${s}">${s}</button>`
  ).join('');
  document.querySelectorAll('.tab').forEach(btn=>{
    btn.onclick = ()=>{ activeTab = btn.dataset.sec; document.getElementById('searchInput').value=''; render(); };
  });
}
function buildSectionSelect(){
  const sel = document.getElementById('newSection');
  sel.innerHTML = SECTIONS.map(s=>`<option value="${s}">${s}</option>`).join('');
  if(SECTIONS.includes(activeTab)) sel.value = activeTab;
}
function buildFixLinkSelect(){
  const sel = document.getElementById('fixLinkSelect');
  const kurtaItems = items.filter(i=>i.section==="Kurtas");
  sel.innerHTML = kurtaItems.map(i=>`<option value="${i.id}">${i.name} (qty ${i.qty})</option>`).join('')
    + `<option value="custom">Other — type name below</option>`;
  sel.onchange = ()=>{
    document.getElementById('fixCustomName').style.display = sel.value==='custom' ? 'block' : 'none';
  };
}

function render(){
  buildTabs();
  buildSectionSelect();

  const isWishlist = activeTab === "Wishlist";
  const isFixing = activeTab === "Fixing";
  document.getElementById('addBoxItem').style.display = (!isWishlist && !isFixing) ? 'flex' : 'none';
  document.getElementById('addBoxWish').style.display = isWishlist ? 'flex' : 'none';
  document.getElementById('addBoxFix').style.display = isFixing ? 'flex' : 'none';
  if(isFixing) buildFixLinkSelect();

  const list = document.getElementById('list');
  const empty = document.getElementById('emptyMsg');
  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  if(isWishlist){ renderWishlist(query); return; }
  if(isFixing){ renderFixing(query); return; }

  let visible = items.filter(i=>{
    if(activeTab!=="All" && i.section!==activeTab) return false;
    if(query && !i.name.toLowerCase().includes(query)) return false;
    return true;
  });

  const total = items.reduce((s,i)=>s+i.qty,0);
  document.getElementById('countLine').textContent = activeTab==="All"
    ? `${items.length} things · ${total} total`
    : `${visible.length} things in ${activeTab}`;

  if(visible.length===0){
    list.innerHTML='';
    empty.textContent = query ? "Nothing matches that." : "Nothing here yet — add something below.";
    empty.style.display='block';
    return;
  }
  empty.style.display='none';
  list.innerHTML = visible.map(it=>{
    const activeFix = activeFixFor(it.id);
    const fixBadge = activeFix ? `<span class="tag pending">${activeFix.type}</span>` : '';
    return `
    <div class="row">
      <div class="row-name">${it.name}${activeTab==="All" ? ` <span style="color:var(--ivory-dim);font-size:12px;">· ${it.section}</span>`:''} ${fixBadge}</div>
      <div class="row-qty">
        <button data-act="dec" data-id="${it.id}">−</button>
        <span class="n">${it.qty}</span>
        <button data-act="inc" data-id="${it.id}">+</button>
      </div>
      <button class="row-del" data-act="del" data-id="${it.id}">remove</button>
    </div>
  `;}).join('');

  list.querySelectorAll('[data-act]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.id;
      const idx = items.findIndex(i=>i.id===id);
      if(idx===-1) return;
      if(btn.dataset.act==='inc') items[idx].qty++;
      if(btn.dataset.act==='dec'){
        if(items[idx].qty<=1){ items.splice(idx,1); }
        else { items[idx].qty--; }
      }
      if(btn.dataset.act==='del') items.splice(idx,1);
      render();
      saveItems();
    };
  });
}

function renderWishlist(query){
  const list = document.getElementById('list');
  const empty = document.getElementById('emptyMsg');
  document.getElementById('countLine').textContent = `${wishlist.length} on the wishlist`;
  let vis = query ? wishlist.filter(w=>w.name.toLowerCase().includes(query)) : wishlist;
  if(vis.length===0){
    list.innerHTML=''; empty.textContent = query ? "Nothing matches that." : "Wishlist is empty.";
    empty.style.display='block'; return;
  }
  empty.style.display='none';
  list.innerHTML = vis.map(w=>`
    <div class="row">
      <div class="row-name">${w.name}</div>
      <button class="row-del" data-wdel="${w.id}">remove</button>
    </div>
  `).join('');
  list.querySelectorAll('[data-wdel]').forEach(btn=>{
    btn.onclick = ()=>{
      wishlist = wishlist.filter(w=>w.id!==btn.dataset.wdel);
      saveWishlist(); render();
    };
  });
}

function renderFixing(query){
  const list = document.getElementById('list');
  const empty = document.getElementById('emptyMsg');
  const pendingCount = fixing.filter(f=>f.status==='Pending').length;
  document.getElementById('countLine').textContent = `${pendingCount} pending · ${fixing.length} total`;

  let vis = query ? fixing.filter(f=>displayFixName(f).toLowerCase().includes(query)) : fixing;
  vis = [...vis].sort((a,b)=> (a.status===b.status)?0:(a.status==='Pending'?-1:1));

  if(vis.length===0){
    list.innerHTML=''; empty.textContent = query ? "Nothing matches that." : "Nothing waiting on the tailor.";
    empty.style.display='block'; return;
  }
  empty.style.display='none';
  list.innerHTML = vis.map(f=>`
    <div class="row ${f.status==='Done'?'done':''}">
      <div class="row-name">${displayFixName(f)} <span class="tag" style="margin-left:6px;">${f.type}</span></div>
      <span class="tag ${f.status==='Done'?'done':'pending'}">${f.status}</span>
      <button class="status-btn" data-fstatus="${f.id}">${f.status==='Done' ? 'Mark pending' : 'Mark done'}</button>
      <button class="row-del" data-fdel="${f.id}">remove</button>
    </div>
  `).join('');

  list.querySelectorAll('[data-fstatus]').forEach(btn=>{
    btn.onclick = ()=>{
      const f = fixing.find(x=>x.id===btn.dataset.fstatus);
      if(!f) return;
      f.status = f.status==='Done' ? 'Pending' : 'Done';
      saveFixing(); render();
    };
  });
  list.querySelectorAll('[data-fdel]').forEach(btn=>{
    btn.onclick = ()=>{
      fixing = fixing.filter(x=>x.id!==btn.dataset.fdel);
      saveFixing(); render();
    };
  });
}
function displayFixName(f){
  if(f.linkedItemId){
    const it = items.find(i=>i.id===f.linkedItemId);
    if(it) return it.name;
  }
  return f.name + (f.linkedItemId ? ' (removed from list)' : '');
}

document.getElementById('addBtn').onclick = ()=>{
  const nameEl = document.getElementById('newName');
  const qtyEl = document.getElementById('newQty');
  const name = nameEl.value.trim();
  const qty = Math.max(1, parseInt(qtyEl.value)||1);
  const section = document.getElementById('newSection').value;
  if(!name){ flash('Type something first.'); return; }
  items.push({ id:'i'+Date.now(), section, name, qty });
  nameEl.value=''; qtyEl.value='1'; nameEl.focus();
  flash('Added to '+section+'.');
  render();
  saveItems();
};
document.getElementById('newName').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('addBtn').click();
});

document.getElementById('addWishBtn').onclick = ()=>{
  const el = document.getElementById('wishName');
  const name = el.value.trim();
  if(!name){ flash('Type something first.'); return; }
  wishlist.push({ id:'w'+Date.now(), name });
  el.value=''; el.focus();
  flash('Added to wishlist.');
  render();
  saveWishlist();
};
document.getElementById('wishName').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('addWishBtn').click();
});

document.getElementById('addFixBtn').onclick = ()=>{
  const sel = document.getElementById('fixLinkSelect');
  const type = document.getElementById('fixType').value;
  const customEl = document.getElementById('fixCustomName');
  let linkedItemId = null;
  let name = '';
  if(sel.value === 'custom'){
    name = customEl.value.trim();
    if(!name){ flash('Type a name first.'); return; }
  } else {
    linkedItemId = sel.value;
    const it = items.find(i=>i.id===linkedItemId);
    name = it ? it.name : 'Item';
  }
  fixing.push({ id:'f'+Date.now(), linkedItemId, name, type, status:'Pending' });
  customEl.value=''; customEl.style.display='none';
  flash('Added to Fixing.');
  render();
  saveFixing();
};

document.getElementById('searchInput').addEventListener('input', render);

loadData();
</script>
</body>
</html>
